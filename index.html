    <!-- Theme init — prevents FOUC by setting class before paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("stch-theme");
          var theme = stored === "light" || stored === "dark" ? stored : "dark";
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
